apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: tfm-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: tfm-app
data:
  replicas_target: "2"
  env: "lab"